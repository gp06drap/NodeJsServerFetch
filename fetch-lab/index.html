<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fetch Lab</title>

  <!-- IMPORT BOOTSTRAP HERE! -->
</head>

<body class="bg-light">
  <main class="container py-4">
    <h1 class="mb-4">Fetch Lab</h1>

    <section id="hello-section" class="card mb-4">
      <div class="card-body">
        <h2 class="h4">1. Hello (text response)</h2>

        <button id="slow-btn" class="btn btn-primary">Slow button</button>
        <div id="slow-result" class="alert alert-secondary mt-3 mb-0" role="alert"></div>

        <button id="hello-btn" class="btn btn-primary">Fetch /hello</button>
        <div id="hello-result" class="alert alert-secondary mt-3 mb-0" role="alert">
          Click the button...
        </div>

        <button id="time-btn" class="btn btn-primary">Fetch /time</button>
        <div id="time-result" class="alert alert-secondary mt-3 mb-0">
          Click the button...
        </div>

        <button id="headers-btn" class="btn btn-primary">Fetch /headers</button>
        <pre id="headers-result" class="alert alert-secondary mt-3 mb-0"></pre>

        <button id="unreliable-btn" class="btn btn-primary">Fetch /unreliable</button>
        <div id="unreliable-result" class="alert alert-secondary mt-3 mb-0" role="alert">
          Click the button...
        </div>
    </section>
    <form method="POST" id="input-form">
      <label>
        Your email:
        <input type="email" name="email">
      </label>
      <label>
        Your message:
        <input type="text" id="text" name="message" required>
      </label>
      <label for="author">Author</label>
      <input name="author" id="author" type="text" required>

      <button id="post-msg-btn" type="button">Post Message</button>
      <button id="webhook" type="button">Send to Webhook</button>
      <button id="formspree" type="button">Send to Formspree</button>
    </form>



    <script>
      // const btnHello = document.querySelector("#hwllo-btn");
      // btnHello.addEventListener("click", makeRequest);
      // Your fetch code goes here
      function makeRequest() {
        fetch("https://psychic-lamp-pvj9g59pgw539prw-8080.app.github.dev/hello")
          .then(statusCheck)
          .then(resp => resp.json())
          .then(handleResponse)
          .catch(handleError)
      }

      async function statusCheck(res) {
        if (!res.ok) {
          throw new Error(await res.text());
        }
        return res;
      }

      function handleResponse(res) {
        const respLoc = document.querySelector(".h4");

        respLoc.textContent = res;
      }



      document.getElementById("webhook").addEventListener("click", function () {
        let url = "https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/messages";
        let params = new FormData(document.getElementById("input-form"));
        fetch(url, { method: "POST", body: params })
          .then(statusCheck)
          .then(resp => resp.json())
          .then(handleResponse)
          .catch(handleError);
      });

      document.getElementById("formspree").addEventListener("click", async () => {
        const form = document.getElementById('input-form');
        const response = await fetch('https://formspree.io/f/mreodrkq', {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          alert('Message sent!');
          form.reset();
        } else {
          alert('Something went wrong. Please try again.');
        }
      });

      document.getElementById("post-msg-btn").addEventListener("click", postMessage);
      async function postMessage() {
        const text = document.getElementById('text').value;
        const author = document.getElementById('author').value;
        if (!text || !author) {
          document.getElementById("hello-result").textContent = "Please fill in all fields.";
          return;
        }
        try {
          const response = await fetch(
            'https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/messages', {
            method: 'POST',
            headers: {
              'Content-Type':
                'application/json'
            },
            body: JSON.stringify(
              { text, author })
          });
          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error);
          }
          const newMsg = await response.json();
          document.getElementById("hello-result").textContent = newMsg.text;

        } catch (error) {
          document.getElementById("hello-result").textContent = `Error: ${error.message}`;
        }
      }

      document.getElementById('slow-btn')
        .addEventListener('click', () => {
          const resultDiv = document.getElementById('slow-result');
          resultDiv.textContent = 'Loading... please wait';
          resultDiv.className = 'alert alert-secondary mt-3';
          fetch('https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/slow')
            .then(statusCheck)
            .then(res => res.json())
            .then(data => {
              resultDiv.textContent = data.message;
              resultDiv.className =
                'alert alert-success mt-3';
            })
            .catch(error => {
              resultDiv.textContent =
                'Error: ' + error.message;
              resultDiv.className =
                'alert alert-danger mt-3';
            });
        });

      document.getElementById('time-btn')
        .addEventListener('click', async () => {
          try {
            const response =
              await fetch('https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/time');
            await statusCheck(response);
            const data =
              await response.json();
            document.getElementById(
              'time-result').textContent =
              data.message + ': '
              + data.currentTime;
          } catch (error) {
            document.getElementById(
              'time-result').textContent =
              'Error: ' + error.message;
          }
        });

      document.getElementById('headers-btn').addEventListener('click', async () => {
        try {
          const response = await fetch('https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/headers');
          await statusCheck(response);
          const data = await response.json();
          document.getElementById('headers-result').textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          document.getElementById('headers-result').textContent = 'Error: ' + error.message;
        }
      });

      document.getElementById('unreliable-btn').addEventListener('click', async () => {
        const resultDiv = document.getElementById('unreliable-result');
        resultDiv.textContent = 'Trying...';
        resultDiv.className = 'alert alert-secondary mt-3';
        try {
          const response = await fetch('https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/unreliable');
          await statusCheck(response);
          const data = await response.json();
          resultDiv.textContent = data.message;
          resultDiv.className = 'alert alert-success mt-3';
        } catch (error) {
          resultDiv.textContent = 'Error: ' + error.message;
          resultDiv.className = 'alert alert-danger mt-3';
        }
      });

    </script>
  </main>
</body>

</html>
