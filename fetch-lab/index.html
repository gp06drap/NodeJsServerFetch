<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fetch Lab</title>

  <!-- IMPORT BOOTSTRAP HERE! -->
</head>

<body class="bg-light">
  <main class="container py-4">
    <h1 class="mb-4">Fetch Lab</h1>

    <section id="hello-section" class="card mb-4">
      <div class="card-body">
        <h2 class="h4">1. Hello (text response)</h2>
        <button id="hello-btn" class="btn btn-primary">Fetch /hello</button>
        <div id="hello-result" class="alert alert-secondary mt-3 mb-0" role="alert">
          Click the button...
        </div>
      </div>
    </section>
    <form method="POST" id="input-form">
      <label>
        Your email:
        <input type="email" name="email">
      </label>
      <label>
        Your message:
        <input type="text" name="message"></input>
      </label>
      <label for="author">Author</label>
      <input name="author" id="author" type="text">

      <button id="webhook" type="button">Send to Webhook</button>
      <button id="formspree" type="button">Send to Formspree</button>
    </form>



    <script>
      // const btnHello = document.querySelector("#hwllo-btn");
      // btnHello.addEventListener("click", makeRequest);
      // Your fetch code goes here
      function makeRequest() {
        fetch("https://psychic-lamp-pvj9g59pgw539prw-8080.app.github.dev/hello")
          .then(statusCheck)
          .then(resp => resp.json())
          .then(handleResponse)
          .catch(handleError)
      }

      async function statusCheck(res) {
        if (!res.ok) {
          throw new Error(await res.text());
        }
        return res;
      }

      function handleResponse(res) {
        const respLoc = document.querySelector(".h4");

        respLoc.textContent = res;
      }



      document.getElementById("webhook").addEventListener("click", function () {
        let url = "https://potential-guide-jjq5v64xgxq6h59r-8080.app.github.dev/api/messages";
        let params = new FormData(document.getElementById("input-form"));
        fetch(url, { method: "POST", body: params })
          .then(statusCheck)
          .then(resp => resp.json())
          .then(handleResponse)
          .catch(handleError);
      });

      document.getElementById("formspree").addEventListener("click", async () => {
        const form = document.getElementById('input-form');
        const response = await fetch('https://formspree.io/f/mreodrkq', {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          alert('Message sent!');
          form.reset();
        } else {
          alert('Something went wrong. Please try again.');
        }
      });







    </script>
  </main>
</body>

</html>
